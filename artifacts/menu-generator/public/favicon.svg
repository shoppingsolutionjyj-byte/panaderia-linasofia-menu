<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#3D0E0A"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="14" y="14" width="484" height="484" rx="84" stroke="#D4A017" stroke-width="10" fill="none"/>
  <rect x="30" y="30" width="452" height="452" rx="70" stroke="#F2C84B" stroke-width="3" fill="none"/>

  <!-- Wheat left -->
  <g opacity="0.7">
    <line x1="90" y1="370" x2="140" y2="260" stroke="#B8880A" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="118" cy="314" rx="22" ry="9" transform="rotate(-35 118 314)" fill="#D4A017"/>
    <ellipse cx="128" cy="290" rx="22" ry="9" transform="rotate(-35 128 290)" fill="#D4A017"/>
    <ellipse cx="136" cy="268" rx="20" ry="8" transform="rotate(-35 136 268)" fill="#C09010"/>
  </g>
  <!-- Wheat right -->
  <g opacity="0.7">
    <line x1="422" y1="370" x2="372" y2="260" stroke="#B8880A" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="394" cy="314" rx="22" ry="9" transform="rotate(35 394 314)" fill="#D4A017"/>
    <ellipse cx="384" cy="290" rx="22" ry="9" transform="rotate(35 384 290)" fill="#D4A017"/>
    <ellipse cx="376" cy="268" rx="20" ry="8" transform="rotate(35 376 268)" fill="#C09010"/>
  </g>

  <!-- "L" lettermark -->
  <text x="256" y="340" font-family="Georgia, serif" font-size="260" font-weight="bold"
        text-anchor="middle" fill="#F2C84B"
        filter="url(#glow)">L</text>

  <!-- Thin gold line below L -->
  <line x1="130" y1="368" x2="382" y2="368" stroke="#D4A017" stroke-width="4" stroke-linecap="round"/>
  <!-- Small diamond -->
  <rect x="248" y="378" width="16" height="16" rx="2" transform="rotate(45 248 378)" fill="#F2C84B"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A0E0A"/>
      <stop offset="50%" stop-color="#8B1A14"/>
      <stop offset="100%" stop-color="#3D0E0A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#F2C84B" flood-opacity="0.5"/>
    </filter>
  </defs>
</svg>
