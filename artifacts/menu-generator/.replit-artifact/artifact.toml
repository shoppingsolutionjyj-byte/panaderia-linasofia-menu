kind = "web"
previewPath = "/"
title = "Generador de Menú - Panadería Linasofia"
version = "1.0.0"
id = "artifacts/menu-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19759

[services.development]
run = "pnpm --filter @workspace/menu-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/menu-generator", "run", "build" ]
publicDir = "artifacts/menu-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19759"
BASE_PATH = "/"
